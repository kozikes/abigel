<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Good Luck</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
        }

        .container {
            text-align: center;
        }

        .text {
            font-size: 4rem;
            font-weight: bold;
            color: white;
            text-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            animation: fadeInScale 1s ease-in-out, bounce 2s ease-in-out 1s infinite;
        }

        @keyframes fadeInScale {
            0% {
                opacity: 0;
                transform: scale(0.5);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        .sparkle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #ffd700;
            border-radius: 50%;
            animation: sparkleAnimation 1.5s ease-in-out infinite;
        }

        .sparkle:nth-child(1) {
            left: 10%;
            top: 20%;
            animation-delay: 0s;
        }

        .sparkle:nth-child(2) {
            right: 10%;
            top: 30%;
            animation-delay: 0.5s;
        }

        .sparkle:nth-child(3) {
            left: 15%;
            bottom: 20%;
            animation-delay: 1s;
        }

        .sparkle:nth-child(4) {
            right: 15%;
            bottom: 25%;
            animation-delay: 1.5s;
        }

        @keyframes sparkleAnimation {
            0%, 100% {
                opacity: 0;
                transform: scale(0);
            }
            50% {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>
<body>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>

    <div class="container">
        <div class="text">✨ Good Luck ✨</div>
    </div>
</body>
</html>
